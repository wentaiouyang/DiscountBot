<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Swipe Specials · 滑一滑省钱</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#EEEFF2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0A0A0D" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SwipeSpecials" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Fonts: Space Grotesk (display, tight modern grotesk) + Manrope (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        /* 安全区域内边距（PWA 全面屏适配） */
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);

        /* ---- 字体 ---- */
        --font-display: 'Space Grotesk', system-ui, -apple-system, sans-serif;
        --font-body: 'Manrope', system-ui, -apple-system, sans-serif;

        /* ---- 主题强调色（默认 = 全部·暖橙；随门店切换为 Coles 红 / Woolies 绿，由 JS 设置）---- */
        --accent: #F2740C;
        --accent-grad: linear-gradient(135deg, #FF9D44 0%, #F2740C 100%);
        --accent-contrast: #ffffff;
        --accent-glow: 0 8px 22px rgba(242, 116, 12, 0.34);
        --accent-soft: rgba(242, 116, 12, 0.18);

        --grad-like: linear-gradient(135deg, #2BE08A 0%, #11B877 100%);
        --grad-nope: linear-gradient(135deg, #FF7A8A 0%, #FF3D5E 100%);

        /* ---- 固定门店 / 语义色 ---- */
        --coles: #E5231B;
        --woolies: #178841;
        --like: #12B877;
        --nope: #FF3D5E;
      }

      /* ===== 浅色主题（柔和·空气感·默认）===== */
      :root,
      [data-theme='light'] {
        color-scheme: light;
        --bg-solid: #EEF2F8;
        --blob-neutral: rgba(40, 60, 110, 0.045);

        --surface: #FFFFFF;
        --surface-2: #F4F7FC;
        --surface-sunken: #E9EEF6;
        --border: rgba(30, 42, 70, 0.08);
        --border-strong: rgba(30, 42, 70, 0.13);

        --text: #1B2433;
        --text-muted: #6A7387;
        --text-faint: #A3ABB9;

        --save-bg: rgba(18, 184, 119, 0.13);
        --save-text: #0A8F5A;
        --discount-bg: #1B2433;
        --discount-text: #FFFFFF;

        /* 柔和、冷调晕开的阴影，营造悬浮空气感 */
        --shadow-card: 0 30px 64px -28px rgba(40, 60, 110, 0.30), 0 10px 26px -14px rgba(40, 60, 110, 0.12);
        --shadow-soft: 0 14px 36px -16px rgba(40, 60, 110, 0.18);
        --shadow-pop: var(--accent-glow);
        --card-sheen: inset 0 1px 0 rgba(255, 255, 255, 0.95), inset 0 0 0 1px rgba(255, 255, 255, 0.6);
      }

      /* ===== 深色主题（冷调炭黑·高对比·默认；data-theme 始终存在于 <html>）===== */
      [data-theme='dark'] {
        color-scheme: dark;
        --bg-solid: #0A0A0D;
        --blob-neutral: rgba(255, 255, 255, 0.04);

        --surface: #15151B;
        --surface-2: #1D1D25;
        --surface-sunken: #0F0F13;
        --border: rgba(255, 255, 255, 0.10);
        --border-strong: rgba(255, 255, 255, 0.18);

        --text: #F4F5F8;
        --text-muted: #9C9DA8;
        --text-faint: #5C5D69;

        --save-bg: rgba(43, 224, 138, 0.16);
        --save-text: #36E08F;
        --discount-bg: #F4F5F8;
        --discount-text: #0A0A0D;

        --shadow-card: 0 30px 64px -20px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        --shadow-soft: 0 12px 32px rgba(0, 0, 0, 0.6);
        --shadow-pop: var(--accent-glow);
        --card-sheen: inset 0 1px 0 rgba(255, 255, 255, 0.07), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      }

      html, body {
        margin: 0;
        font-family: var(--font-body);
        background: var(--bg-solid);
        color: var(--text);
        overscroll-behavior: none;
        overflow-x: clip;
        transition: background-color 0.4s ease, color 0.4s ease;
      }

      /* 活力渐变光斑背景（固定层，置于内容之下） */
      body::before {
        content: '';
        position: fixed;
        inset: -10% -10% -10% -10%;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(40vmax 40vmax at 10% -8%, var(--accent-soft), transparent 60%),
          radial-gradient(34vmax 34vmax at 104% 16%, var(--blob-neutral), transparent 58%),
          radial-gradient(44vmax 44vmax at 52% 118%, var(--accent-soft), transparent 62%);
        transition: background 0.5s ease;
      }

      @media (prefers-reduced-motion: reduce) {
        html, body, body::before { transition: none; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
